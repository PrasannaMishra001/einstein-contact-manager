name: Build Einstein Contact Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            executable: einstein.exe
            artifact-name: einstein-windows.exe
          - os: ubuntu-latest
            executable: einstein
            artifact-name: einstein-linux
          - os: macos-latest
            executable: einstein
            artifact-name: einstein-macos
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Create embedded credentials from secrets
      run: |
        mkdir -p contacts
        cat > contacts/embedded_credentials.py << 'EOF'
        EMBEDDED_CREDENTIALS = """${{ secrets.GOOGLE_CREDENTIALS }}"""
        
        AUTHORIZED_USERS = [
            "mishra.prasanna838@gmail.com",
            # Add more test users
        ]
        EOF
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Create PyInstaller spec
      run: |
        python - <<'PYCODE'
        import os
        spec_content = '''
        block_cipher = None

        a = Analysis(
            ['main.py'],
            pathex=[],
            binaries=[],
            datas=[
                ('data', 'data'),
                ('docs', 'docs'),
            ],
            hiddenimports=[
                'google.auth',
                'google.auth.transport',
                'google_auth_oauthlib',
                'googleapiclient',
                'rich',
                'PIL',
                'contacts.contact',
                'contacts.addressbook', 
                'contacts.cli_interface',
                'contacts.fileops',
                'contacts.utils',
                'contacts.google_sync',
                'contacts.embedded_credentials',
            ],
            hookspath=[],
            hooksconfig={},
            runtime_hooks=[],
            excludes=[],
            win_no_prefer_redirects=False,
            win_private_assemblies=False,
            cipher=block_cipher,
            noarchive=False,
        )

        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

        exe = EXE(
            pyz,
            a.scripts,
            a.binaries,
            a.zipfiles,
            a.datas,
            [],
            name='einstein',
            debug=False,
            bootloader_ignore_signals=False,
            strip=False,
            upx=True,
            upx_exclude=[],
            runtime_tmpdir=None,
            console=True,
            disable_windowed_traceback=False,
            argv_emulation=False,
            target_arch=None,
            codesign_identity=None,
            entitlements_file=None,
        )
        '''
        with open('einstein.spec', 'w') as f:
            f.write(spec_content)
        PYCODE
    
    - name: Build executable
      run: |
        pyinstaller --clean einstein.spec
    
    - name: Rename executable
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/einstein.exe dist/${{ matrix.artifact-name }}
        else
          mv dist/einstein dist/${{ matrix.artifact-name }}
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}-${{ matrix.os }}
        path: dist/${{ matrix.artifact-name }}
        # include-hidden-files: true  # uncomment if hidden files are needed
    
    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

